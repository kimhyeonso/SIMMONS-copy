             <!-- 좌우버튼 -->

        <button class="arrow next"><img src="./image/imgi_39_ico-hero-next..png" alt=""></button>

        <!-- 도트 -->
        <div class="dotwrap">
            <div class="dot on"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>
    </section>

    <script>
        const slides = $(".slide")
        const dots = $(".dot")

        let index = 0;
        let slideInterval;

        function moveSlide(){
            slides.stop(true, true).fadeOut(300)
            slides.eq(index).stop(true, true).fadeIn(300)
            dots.removeClass("on")
            dots.eq(index).addClass("on")
        }

        function autoSlide(){
            clearInterval(slideInterval);

            slideInterval = setInterval(function(){
                index++
                if( index >= slides.length ){
                    index = 0;
                }
                moveSlide();

            }, 3000)
    }

        $(".next").on("click",function(){
            index++
            if(index >= slides.length){
                index = 0
            }
            moveSlide();
            autoSlide();
        })

        $(".prev").on("click",function(){
            index--
            if(index < 0){
                index = slides.length - 1 
            }
            moveSlide();
            autoSlide();
        })

        dots.on("click",function(){
            index = $(this).index()
            moveSlide()
            autoSlide();
        })

        autoSlide();
    </script>
